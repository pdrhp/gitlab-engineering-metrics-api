              }
            ],
            "breakdown_by_user": [
              {
                "username": "nevez",
                "ghost_work_count": 50,
                "issue_iids": [371, 369, 364, 360, 355]
              },
              {
                "username": "gabriel",
                "ghost_work_count": 32,
                "issue_iids": [371, 369, 364]
              }
            ],
            "page": 1,
            "page_size": 10,
            "total_pages": 27
          }
  - name: 400 Response
    description: Parametros invalidos
    request:
      url: "{{baseUrl}}/metrics/ghost-work"
      method: GET
      params:
        - name: start_date
          value: invalid
          type: query
        - name: end_date
          value: 2026-01-31
          type: query
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "BAD_REQUEST",
            "message": "invalid start_date format, expected YYYY-MM-DD",
            "request_id": ""
          }
  - name: 401 Response
    description: Credenciais ausentes ou invalidas
    request:
      url: "{{baseUrl}}/metrics/ghost-work"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "UNAUTHORIZED",
            "message": "",
            "request_id": ""
          }
  - name: 500 Response
    description: Erro interno
    request:
      url: "{{baseUrl}}/metrics/ghost-work"
      method: GET
      params:
        - name: start_date
          value: 2026-01-01
          type: query
        - name: end_date
          value: 2026-01-31
          type: query
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INTERNAL_ERROR",
