info:
  name: Retorna deep dive de ghost work
  type: http
  seq: 4
  tags:
    - Metrics

http:
  method: GET
  url: "{{baseUrl}}/metrics/ghost-work"
  params:
    - name: start_date
      value: 2026-01-01
      type: query
      disabled: true
    - name: end_date
      value: 2026-01-31
      type: query
      disabled: true
    - name: project_id
      value: ""
      type: query
      disabled: true
    - name: group_path
      value: ""
      type: query
      disabled: true
    - name: assignee
      value: nevez
      type: query
      disabled: true
    - name: issue_id
      value: ""
      type: query
      disabled: true
    - name: gitlab_issue_id
      value: ""
      type: query
      disabled: true
    - name: issue_iid
      value: ""
      type: query
      disabled: true
    - name: page
      value: "1"
      type: query
      disabled: true
    - name: page_size
      value: "25"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Deep dive de ghost work com lista de issues e analises
    request:
      url: "{{baseUrl}}/metrics/ghost-work"
      method: GET
      params:
        - name: start_date
          value: 2026-01-01
          type: query
        - name: end_date
          value: 2026-01-31
          type: query
        - name: page
          value: "1"
          type: query
        - name: page_size
          value: "10"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "total_issues": 270,
            "period": {
              "start_date": "2026-01-01",
              "end_date": "2026-01-31"
            },
            "issues": [
              {
                "issue_id": 123,
                "gitlab_issue_id": 456,
                "issue_iid": 371,
                "project_id": 789,
                "project_path": "apps-expo/dflegal-expo",
                "issue_title": "[PASTA DE TRABALHO] - Filtragem de Ordens de Serviço...",
                "assignees": ["gabriel"],
                "from_state": "BACKLOG",
                "to_state": "QA_REVIEW",
                "transition_time": "2026-03-06T14:17:15.282Z",
                "duration_hours": 0.01,
