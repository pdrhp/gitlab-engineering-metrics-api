        - name: end_date
          value: ""
          type: query
        - name: project_id
          value: ""
          type: query
          disabled: true
        - name: group_path
          value: ""
          type: query
          disabled: true
        - name: assignee
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "period": {
              "start_date": "",
              "end_date": ""
            },
            "throughput": {
              "total_issues_done": 0,
