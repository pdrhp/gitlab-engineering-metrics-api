info:
  name: Retorna metricas de delivery
  type: http
  seq: 1
  tags:
    - Metrics

http:
  method: GET
  url: "{{baseUrl}}/metrics/delivery"
  params:
    - name: start_date
      value: ""
      type: query
    - name: end_date
      value: ""
      type: query
    - name: project_id
      value: ""
      type: query
      disabled: true
    - name: group_path
      value: ""
      type: query
      disabled: true
    - name: assignee
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
