info:
  name: Retorna metricas de qualidade e gargalos
  type: http
  seq: 3
  tags:
    - Metrics

http:
  method: GET
  url: "{{baseUrl}}/metrics/quality"
  params:
    - name: start_date
      value: ""
      type: query
    - name: end_date
      value: ""
      type: query
    - name: project_id
      value: ""
      type: query
      disabled: true
    - name: group_path
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Metricas de qualidade
    request:
      url: "{{baseUrl}}/metrics/quality"
      method: GET
      params:
        - name: start_date
          value: ""
          type: query
        - name: end_date
          value: ""
          type: query
        - name: project_id
          value: ""
          type: query
          disabled: true
        - name: group_path
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "rework": {
              "ping_pong_rate_pct": 0,
              "total_reworked_issues": 0,
              "avg_rework_cycles_per_issue": 0
            },
            "process_health": {
              "bypass_rate_pct": 0,
              "first_time_pass_rate_pct": 0
            },
            "bottlenecks": {
              "total_blocked_time_hours": 0,
              "avg_blocked_time_per_issue_hours": 0
            },
            "defects": {
