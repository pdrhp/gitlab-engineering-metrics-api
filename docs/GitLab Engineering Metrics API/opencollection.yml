opencollection: 1.0.0

info:
  name: GitLab Engineering Metrics API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: X-Client-ID
      value: myclient
    - name: X-Client-Secret
      value: mysecret
  variables:
    - name: baseUrl
      value: http://localhost:8080/api/v1
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
